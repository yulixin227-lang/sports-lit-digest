name: Daily Sports Lit Digest

on:
  workflow_dispatch:
    inputs:
      days_back:
        description: "Days back to search"
        required: false
        default: "3"
      dry_run:
        description: "Render without updating seen_papers.json or sending WeChat"
        required: false
        default: "false"
      force_send:
        description: "Manual test only: ignore seen cache for this run and do not update it"
        required: false
        default: "false"
      wechat_mode:
        description: "WeChat mode: short, full, or smart"
        required: false
        default: "short"
  schedule:
    # GitHub Actions cron uses UTC; 00:00 UTC is 08:00 Asia/Taipei.
    - cron: "0 0 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build-digest:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      DAYS_BACK: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.days_back || '3' }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}
      FORCE_SEND: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_send || 'false' }}
      WECHAT_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.wechat_mode || 'short' }}
      NCBI_EMAIL: ${{ secrets.NCBI_EMAIL }}
      NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
      CROSSREF_MAILTO: ${{ secrets.CROSSREF_MAILTO }}
      SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
      WXPUSHER_SPT_ENABLED: ${{ secrets.WXPUSHER_SPT_ENABLED }}
      WXPUSHER_SPT_URL: ${{ secrets.WXPUSHER_SPT_URL }}
      WXPUSHER_ENABLED: "true"
      WXPUSHER_APP_TOKEN: ${{ secrets.WXPUSHER_APP_TOKEN }}
      WXPUSHER_UIDS: ${{ secrets.WXPUSHER_UIDS }}
      WXPUSHER_TOPIC_IDS: ${{ secrets.WXPUSHER_TOPIC_IDS }}
      PUBLIC_DIGEST_BASE_URL: ${{ secrets.PUBLIC_DIGEST_BASE_URL }}
      DIGEST_TIMEZONE: Asia/Taipei
      SKIP_EMPTY_PUSH: "true"
      SEND_EMPTY_STATUS: "true"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore seen papers cache
        uses: actions/cache/restore@v4
        with:
          path: data/seen_papers.json
          key: seen-papers-${{ github.run_id }}
          restore-keys: |
            seen-papers-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run digest
        run: |
          ARGS=(--days-back "$DAYS_BACK" --send-wechat --wechat-mode "$WECHAT_MODE")
          if [ "$DRY_RUN" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          if [ "$FORCE_SEND" = "true" ]; then
            ARGS+=(--force-send)
          fi
          python -m src.main "${ARGS[@]}"

      - name: Save seen papers cache
        if: ${{ env.DRY_RUN != 'true' && env.FORCE_SEND != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: data/seen_papers.json
          key: seen-papers-${{ github.run_id }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: outputs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
